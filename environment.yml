name: geo_env
channels:
  - conda-forge

dependencies:
  - python>=3.11
  - ipykernel>=6.30.0
  - numpy>=1.26.4,<2
  - pandas>=2.3.1
  - matplotlib>=3.10.3
  - netcdf4>=1.7.2
  - rasterio>=1.4.3
  - geopandas>=1.1.1
  - tqdm>=4.67.1
  - requests>=2.32.4
  - scipy>=1.16.0
  - scikit-learn>=1.7.1
  - statsmodels>=0.14.5
  - opencv>=4.0.0
  - gdal                # osgeo.gdal / osgeo.ogr / osgeo.osr が使用可能
  - pip
  - pip:
    - pypdf>=5.8.0
    - gpxpy>=1.6.2
    - git+https://github.com/koki190403nen/geotool.git
